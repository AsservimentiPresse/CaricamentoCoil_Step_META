<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - AR Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:sans-serif;
}

model-viewer{
width:95vw;
height:75vh;
}

/* AR button */

model-viewer::part(default-ar-button){
width:110px;
height:110px;
border-radius:50%;
background:white;
}

/* CONTROLLI */

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls-section h3{
margin-right:15px;
font-size:1.6rem;
min-width:170px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:15px;
}

/* BOTTONI IMMAGINE */

.animButton{

width:90px;
height:90px;

border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;

background:#333;

display:flex;
align-items:center;
justify-content:center;

}

.animButton img{

width:100%;
height:100%;
object-fit:cover;

}

/* pulsante attivo */

.animButton.active{
outline:4px solid white;
}

/* reset */

.reset{
padding:14px 24px;
border-radius:12px;
border:none;
background:#444;
color:white;
font-size:1.1rem;
cursor:pointer;
}

/* COLORI */

button.color{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:1rem;
color:white;
}

.green{background:green;}
.blue{background:blue;}
.yellow{background:yellow;color:black;}
.lightgray{background:lightgray;color:black;}
.darkgray{background:dimgray;}
.red{background:red;}
.orange{background:orange;}

</style>

</head>

<body>

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
orientation="180deg 180deg 0deg"
shadow-intensity="0"
exposure="0.5"> </model-viewer>

<!-- ANIMAZIONI -->

<div class="controls-section">

<h3>Animations</h3>

<div class="controls">

<button id="anim0" class="animButton" onclick="toggleAnimation(0)">
<img src="anim1.png">
</button>

<button id="anim1" class="animButton" onclick="toggleAnimation(1)">
<img src="anim2.png">
</button>

<button id="anim2" class="animButton" onclick="toggleAnimation(2)">
<img src="anim3.png">
</button>

<button id="anim3" class="animButton" onclick="toggleAnimation(3)">
<img src="anim4.png">
</button>

<button id="anim4" class="animButton" onclick="toggleAnimation(4)">
<img src="anim5.png">
</button>

<button class="reset" onclick="resetAnimations()">RESET</button>

</div>

</div>

<!-- STRUCTURE COLOR -->

<div class="controls-section">

<h3>Structure Color</h3>

<div class="controls">

<button class="color green" onclick="changeColor(0,[0,0.1,0,1])">Verde</button> <button class="color blue" onclick="changeColor(0,[0,0,0.18,1])">Blu</button> <button class="color orange" onclick="changeColor(0,[1,0.12,0,1])">Arancio</button> <button class="color lightgray" onclick="changeColor(0,[0.55,0.55,0.55,1])">Grigio chiaro</button> <button class="color darkgray" onclick="changeColor(0,[0.25,0.25,0.25,1])">Grigio scuro</button> <button class="color red" onclick="changeColor(0,[0.22,0,0,1])">Rosso</button>

</div>

</div>

<!-- MOBILE PARTS -->

<div class="controls-section">

<h3>Mobile Parts Color</h3>

<div class="controls">

<button class="color green" onclick="changeColor(2,[0,0.1,0,1])">Verde</button> <button class="color blue" onclick="changeColor(2,[0,0,1,1])">Blu</button> <button class="color yellow" onclick="changeColor(2,[1,1,0,1])">Giallo</button> <button class="color lightgray" onclick="changeColor(2,[0.55,0.55,0.55,1])">Grigio chiaro</button> <button class="color darkgray" onclick="changeColor(2,[0.33,0.33,0.33,1])">Grigio scuro</button> <button class="color red" onclick="changeColor(2,[1,0,0,1])">Rosso</button>

</div>

</div>

<script>

const modelViewer=document.querySelector("#viewer")

let animations=[]
let currentAnimation=null

modelViewer.addEventListener("load",()=>{

animations=modelViewer.availableAnimations

})

function toggleAnimation(index){

if(!animations[index]) return

const anim=animations[index]

const button=document.getElementById("anim"+index)

/* stessa animazione */

if(currentAnimation===anim){

if(modelViewer.paused){

modelViewer.play()
button.classList.add("active")

}else{

modelViewer.pause()
button.classList.remove("active")

}

}else{

clearButtons()

currentAnimation=anim

modelViewer.animationName=anim
modelViewer.play()

button.classList.add("active")

}

}

/* reset */

function resetAnimations(){

modelViewer.pause()
modelViewer.currentTime=0

currentAnimation=null

clearButtons()

}

/* clear pulsanti */

function clearButtons(){

for(let i=0;i<5;i++){

const b=document.getElementById("anim"+i)

if(b) b.classList.remove("active")

}

}

/* cambio colore */

function changeColor(materialIndex,rgba){

const material=modelViewer.model.materials[materialIndex]

if(material && material.pbrMetallicRoughness){

material.pbrMetallicRoughness.setBaseColorFactor(rgba)

}

}

</script>

</body>
</html>
