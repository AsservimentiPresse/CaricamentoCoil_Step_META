<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - STEP PUZZLE</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:sans-serif;
}

model-viewer{
width:95vw;
height:75vh;
}

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls-section h3{
margin-right:15px;
font-size:1.6rem;
min-width:170px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.animButton{
width:90px;
height:90px;
border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:#333;
display:flex;
align-items:center;
justify-content:center;
}

.animButton img{
width:100%;
height:100%;
object-fit:cover;
}

.animButton.active{
outline:4px solid white;
}

.reset{
padding:14px 24px;
border-radius:12px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

button.color{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:1rem;
color:white;
}

.green{background:green;}
.blue{background:blue;}
.yellow{background:yellow;color:black;}
.lightgray{background:lightgray;color:black;}
.darkgray{background:dimgray;}
.red{background:red;}
.orange{background:orange;}
</style>

</head>

<body>

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
orientation="180deg 180deg 0deg"
shadow-intensity="0"
exposure="0.5"> </model-viewer>

<!-- STEP -->

<div class="controls-section">
<h3>Steps</h3>

<div class="controls">

<button id="step0" class="animButton" onclick="goToStep(0)"><img src="anim1.png"></button> <button id="step1" class="animButton" onclick="goToStep(1)"><img src="anim2.png"></button> <button id="step2" class="animButton" onclick="goToStep(2)"><img src="anim3.png"></button> <button id="step3" class="animButton" onclick="goToStep(3)"><img src="anim4.png"></button> <button id="step4" class="animButton" onclick="goToStep(4)"><img src="anim5.png"></button>

<button class="reset" onclick="resetAll()">RESET</button>

</div>
</div>

<!-- COLORI STRUCTURE -->

<div class="controls-section">
<h3>Structure Color</h3>

<div class="controls">
<button class="color green" onclick="changeColor(0,[0,0.1,0,1])">Verde</button>
<button class="color blue" onclick="changeColor(0,[0,0,0.18,1])">Blu</button>
<button class="color orange" onclick="changeColor(0,[1,0.12,0,1])">Arancio</button>
<button class="color lightgray" onclick="changeColor(0,[0.55,0.55,0.55,1])">Grigio</button>
<button class="color darkgray" onclick="changeColor(0,[0.25,0.25,0.25,1])">Scuro</button>
<button class="color red" onclick="changeColor(0,[0.22,0,0,1])">Rosso</button>
</div>
</div>

<!-- COLORI MOBILE -->

<div class="controls-section">
<h3>Mobile Parts</h3>

<div class="controls">
<button class="color green" onclick="changeColor(2,[0,0.1,0,1])">Verde</button>
<button class="color blue" onclick="changeColor(2,[0,0,1,1])">Blu</button>
<button class="color yellow" onclick="changeColor(2,[1,1,0,1])">Giallo</button>
<button class="color lightgray" onclick="changeColor(2,[0.55,0.55,0.55,1])">Grigio</button>
<button class="color darkgray" onclick="changeColor(2,[0.33,0.33,0.33,1])">Scuro</button>
<button class="color red" onclick="changeColor(2,[1,0,0,1])">Rosso</button>
</div>
</div>

<script>

const modelViewer=document.querySelector("#viewer")

let animations=[]
let currentStep=0

modelViewer.addEventListener("load",()=>{
animations=modelViewer.availableAnimations
})

/* 🔥 METTI QUI I TUOI SECONDI */
let stepTimes = [0, 100, 2, 300, 4]

function goToStep(step){

if(!animations.length) return

const anim = animations[0]

// 🔥 FORZA SEMPRE LA STESSA ANIMAZIONE
modelViewer.animationName = anim

modelViewer.play()

const targetTime = stepTimes[step]

const interval = setInterval(()=>{

if(modelViewer.currentTime >= targetTime){
modelViewer.pause()
clearInterval(interval)
}

},16)

updateButtons(step)
currentStep = step
}

function updateButtons(activeStep){

for(let i=0;i<stepTimes.length;i++){
const b=document.getElementById("step"+i)
if(b) b.classList.remove("active")
}

const active=document.getElementById("step"+activeStep)
if(active) active.classList.add("active")
}

function resetAll(){

if(!animations.length) return

const anim = animations[0]

modelViewer.animationName = anim
modelViewer.currentTime = 0
modelViewer.pause()

currentStep = 0
updateButtons(0)
}

function changeColor(materialIndex,rgba){

const material=modelViewer.model.materials[materialIndex]

if(material && material.pbrMetallicRoughness){
material.pbrMetallicRoughness.setBaseColorFactor(rgba)
}

}

</script>

</body>
</html>
