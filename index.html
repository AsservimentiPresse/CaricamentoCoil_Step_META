<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - AR Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:sans-serif;
}

model-viewer{
width:95vw;
height:75vh;
}

/* AR button */

model-viewer::part(default-ar-button){
width:110px;
height:110px;
border-radius:50%;
background:white;
}

/* CONTROLLI */

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls-section h3{
margin-right:15px;
font-size:1.6rem;
min-width:170px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:15px;
}

/* BOTTONI */

.animButton{
width:90px;
height:90px;
border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:#333;
display:flex;
align-items:center;
justify-content:center;
}

.animButton img{
width:100%;
height:100%;
object-fit:cover;
}

.animButton.active{
outline:4px solid white;
}

.reset{
padding:14px 24px;
border-radius:12px;
border:none;
background:#444;
color:white;
font-size:1.1rem;
cursor:pointer;
}

/* COLORI */

button.color{
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:1rem;
color:white;
}

.green{background:green;}
.blue{background:blue;}
.yellow{background:yellow;color:black;}
.lightgray{background:lightgray;color:black;}
.darkgray{background:dimgray;}
.red{background:red;}
.orange{background:orange;}

/* 🔥 SLIDER */

.timeline-container{
display:none;
flex-direction:column;
align-items:center;
width:90%;
margin-top:10px;
}

.timeline-container.active{
display:flex;
}

.timeline-slider{
width:100%;
}

.timeline-button{
margin-left:10px;
padding:10px 20px;
background:#666;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
orientation="180deg 180deg 0deg"
shadow-intensity="0"
exposure="0.5"> </model-viewer>

<!-- STEP -->

<div class="controls-section">

<h3>Steps</h3>

<div class="controls">

<button id="step0" class="animButton" onclick="goToStep(0)"><img src="anim1.png"></button> <button id="step1" class="animButton" onclick="goToStep(1)"><img src="anim2.png"></button> <button id="step2" class="animButton" onclick="goToStep(2)"><img src="anim3.png"></button> <button id="step3" class="animButton" onclick="goToStep(3)"><img src="anim4.png"></button> <button id="step4" class="animButton" onclick="goToStep(4)"><img src="anim5.png"></button>

<button class="reset" onclick="resetAll()">RESET</button>

<!-- 🔥 TOGGLE SLIDER -->

<button class="timeline-button" onclick="toggleTimeline()">TIMELINE</button>

</div>

</div>

<!-- 🔥 SLIDER -->

<div id="timelineContainer" class="timeline-container">

<input type="range"
id="timelineSlider"
class="timeline-slider"
min="0"
max="35.4"
step="0.01"
value="0">

</div>

<!-- STRUCTURE COLOR -->

<div class="controls-section">

<h3>Structure Color</h3>

<div class="controls">

<button class="color green" onclick="changeColor(0,[0,0.1,0,1])">Verde</button> <button class="color blue" onclick="changeColor(0,[0,0,0.18,1])">Blu</button> <button class="color orange" onclick="changeColor(0,[1,0.12,0,1])">Arancio</button> <button class="color lightgray" onclick="changeColor(0,[0.55,0.55,0.55,1])">Grigio chiaro</button> <button class="color darkgray" onclick="changeColor(0,[0.25,0.25,0.25,1])">Grigio scuro</button> <button class="color red" onclick="changeColor(0,[0.22,0,0,1])">Rosso</button>

</div>

</div>

<!-- MOBILE PARTS -->

<div class="controls-section">

<h3>Mobile Parts Color</h3>

<div class="controls">

<button class="color green" onclick="changeColor(2,[0,0.1,0,1])">Verde</button> <button class="color blue" onclick="changeColor(2,[0,0,1,1])">Blu</button> <button class="color yellow" onclick="changeColor(2,[1,1,0,1])">Giallo</button> <button class="color lightgray" onclick="changeColor(2,[0.55,0.55,0.55,1])">Grigio chiaro</button> <button class="color darkgray" onclick="changeColor(2,[0.33,0.33,0.33,1])">Grigio scuro</button> <button class="color red" onclick="changeColor(2,[1,0,0,1])">Rosso</button>

</div>

</div>

<script>

const modelViewer=document.querySelector("#viewer")
const slider=document.getElementById("timelineSlider")
const timelineContainer=document.getElementById("timelineContainer")

let animations=[]

/* 🔥 METTI QUI I TUOI TEMPI */
let stepTimes=[0,5,10,20,30]

modelViewer.addEventListener("load",()=>{
animations=modelViewer.availableAnimations
slider.max=modelViewer.duration
})

function goToStep(step){

if(!animations.length) return

const anim=animations[0]

modelViewer.animationName=anim
modelViewer.play()

const targetTime=stepTimes[step]

const interval=setInterval(()=>{

if(modelViewer.currentTime>=targetTime){
modelViewer.pause()
clearInterval(interval)
}

},16)

updateButtons(step)
}

/* 🔥 HIGHLIGHT */

function updateButtons(activeStep){

for(let i=0;i<stepTimes.length;i++){
const b=document.getElementById("step"+i)
if(b) b.classList.remove("active")
}

const active=document.getElementById("step"+activeStep)
if(active) active.classList.add("active")
}

/* RESET */

function resetAll(){

if(!animations.length) return

const anim=animations[0]

modelViewer.animationName=anim
modelViewer.currentTime=0
modelViewer.pause()

slider.value=0
updateButtons(0)
}

/* 🔥 TOGGLE */

function toggleTimeline(){
timelineContainer.classList.toggle("active")
}

/* 🔥 SLIDER CONTROL */

slider.addEventListener("input",()=>{

if(!animations.length) return

const anim=animations[0]

modelViewer.animationName=anim
modelViewer.currentTime=parseFloat(slider.value)

/* 🔥 AUTO HIGHLIGHT */

let closest=0
let min=Infinity

for(let i=0;i<stepTimes.length;i++){
let diff=Math.abs(stepTimes[i]-modelViewer.currentTime)
if(diff<min){
min=diff
closest=i
}
}

updateButtons(closest)

})

/* 🔥 SYNC MODEL → SLIDER */

modelViewer.addEventListener("timeupdate",()=>{

if(document.activeElement!==slider){
slider.value=modelViewer.currentTime
}

})

/* COLORI */

function changeColor(materialIndex,rgba){

const material=modelViewer.model.materials[materialIndex]

if(material && material.pbrMetallicRoughness){
material.pbrMetallicRoughness.setBaseColorFactor(rgba)
}

}

</script>

</body>
</html>
