<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>ASSIEME - STEP PUZZLE</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:sans-serif;
}

model-viewer{
width:95vw;
height:75vh;
}

/* CONTROLLI */

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:15px;
}

/* BOTTONI */

.animButton{
width:90px;
height:90px;
border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:#333;
display:flex;
align-items:center;
justify-content:center;
}

.animButton img{
width:100%;
height:100%;
object-fit:cover;
}

.animButton.active{
outline:4px solid white;
}

.reset{
padding:14px 24px;
border-radius:12px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<model-viewer
id="viewer"
src="linea lunga PROVA ANIMAZIONI.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
orientation="0deg 180deg 0deg"
shadow-intensity="0"
exposure="0.5"> </model-viewer>

<div class="controls-section">

<div class="controls">

<button id="step0" class="animButton" onclick="goToStep(0)">
<img src="anim1.png">
</button>

<button id="step1" class="animButton" onclick="goToStep(1)">
<img src="anim2.png">
</button>

<button id="step2" class="animButton" onclick="goToStep(2)">
<img src="anim3.png">
</button>

<button id="step3" class="animButton" onclick="goToStep(3)">
<img src="anim4.png">
</button>

<button id="step4" class="animButton" onclick="goToStep(4)">
<img src="anim5.png">
</button>

<button class="reset" onclick="resetAll()">RESET</button>

</div>

</div>

<script>

const modelViewer = document.querySelector("#viewer")

let animations = []
let currentStep = 0

// ⚠️ DA PERSONALIZZARE
let stepTimes = [0, 1, 2, 3, 4]

modelViewer.addEventListener("load", ()=>{
  animations = modelViewer.availableAnimations
})

function goToStep(step){

  if(!animations.length) return

  const anim = animations[0]

  modelViewer.animationName = anim

  modelViewer.play()

  const targetTime = stepTimes[step]

  const interval = setInterval(()=>{

    if(modelViewer.currentTime >= targetTime){
      modelViewer.pause()
      clearInterval(interval)
    }

  }, 16)

  updateButtons(step)
  currentStep = step
}

function updateButtons(activeStep){

  for(let i=0;i<stepTimes.length;i++){
    const b = document.getElementById("step"+i)
    if(b) b.classList.remove("active")
  }

  const active = document.getElementById("step"+activeStep)
  if(active) active.classList.add("active")

}

function resetAll(){

  if(!animations.length) return

  const anim = animations[0]

  modelViewer.animationName = anim
  modelViewer.currentTime = 0
  modelViewer.pause()

  currentStep = 0
  updateButtons(0)

}

</script>

</body>
</html>
