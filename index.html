Smart AR Asservimentipresse
<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Smart AR Coil Load</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

/* ===== BASE ===== */

body{
margin: 0;
background: #000;
display: flex;
flex-direction: column;
align-items: center;
color: white;
font-family: sans-serif;
}

model-viewer{
width:95vw;
height:75vh;
}

/* ===== AR BUTTON ===== */

model-viewer::part(default-ar-button){
width:110px;
height:110px;
border-radius:50%;
background-color: white;
}

/* ===== CONTROLLI ===== */

.controls-section{
display:flex;
align-items:center;
margin:12px 0;
width:95vw;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:15px;
}

/* ===== BOTTONI ===== */

.animButton{
width:140px;
height:120px;
border:none;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:#333;
display:flex;
align-items:center;
justify-content:center;
}

.animButton img{
width:100%;
height:100%;
object-fit: cover;
}

.animButton.active{
outline:4px solid white;
}

.reset{
padding:14px 24px;
border-radius:12px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

/* ===== TIMELINE ===== */

.timeline-container{
display:none;
flex-direction:column;
align-items:center;
width:90%;
margin-top:10px;
}

.timeline-container.active{
display:flex;
}

.timeline-slider{
width:100%;
pointer-events:none;
opacity:0.7;
}

.timeline-button{
margin-top:10px;
padding:10px 20px;
background:#666;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* ===== COLORI ===== */

button {
padding:12px 22px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
}

.green { background: green; }
.blue { background: blue; }
.yellow { background: yellow; color: grey;}
.lightgray { background: lightgray; color: black; }
.darkgray { background: dimgray; }
.red { background: red; }
.orange { background: orange; }

</style>

</head>

<body>

<!-- ===== MODEL ===== -->

<model-viewer
id="viewer"
src="linea lunga_V4.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
orientation="180deg 180deg 0deg"
shadow-intensity="0"
exposure="0.5"> </model-viewer>

<!-- ===== STEP BUTTONS ===== -->

<div class="controls-section">
<div class="controls">

<button id="step0" class="animButton" onclick="goToStep(0)"><img src="anim1.png"></button> <button id="step1" class="animButton" onclick="goToStep(1)"><img src="anim2.png"></button> <button id="step2" class="animButton" onclick="goToStep(2)"><img src="anim3.png"></button> <button id="step3" class="animButton" onclick="goToStep(3)"><img src="anim4.png"></button> <button id="step4" class="animButton" onclick="goToStep(4)"><img src="anim5.png"></button>

<button class="reset" onclick="resetAll()">RESET</button> <button class="timeline-button" onclick="toggleTimeline()">TIMELINE</button>

</div>
</div>

<!-- ===== TIMELINE ===== -->

<div id="timelineContainer" class="timeline-container">
<input type="range" id="timelineSlider" class="timeline-slider" min="0" max="35.4" step="0.01" value="0">
</div>

<script>

const modelViewer=document.querySelector("#viewer")
const slider=document.getElementById("timelineSlider")
const timelineContainer=document.getElementById("timelineContainer")

let animations=[]

/* STEP TIMES */
let stepTimes=[4,13,23,31,35.4]

/* LOAD */

modelViewer.addEventListener("load",()=>{

animations=modelViewer.availableAnimations

if(animations.length){
modelViewer.animationName=animations[0]
modelViewer.play()
}

slider.max=modelViewer.duration

})

/* STEP LOGIC CORRETTA (PUZZLE) */

function goToStep(step){

if(!animations.length) return

const targetTime=stepTimes[step]

// NON resetta più → continua da dove sei
modelViewer.play()

const interval=setInterval(()=>{

if(modelViewer.currentTime>=targetTime){
modelViewer.pause()
clearInterval(interval)
}

},16)

updateButtons(step)

}

/* HIGHLIGHT */

function updateButtons(activeStep){

for(let i=0;i<stepTimes.length;i++){
const b=document.getElementById("step"+i)
if(b) b.classList.remove("active")
}

if(activeStep!==null){
const active=document.getElementById("step"+activeStep)
if(active) active.classList.add("active")
}

}

/* RESET */

function resetAll(){

modelViewer.currentTime=0
modelViewer.pause()

slider.value=0

updateButtons(null)

}

/* TIMELINE TOGGLE */

function toggleTimeline(){
timelineContainer.classList.toggle("active")
}

/* TIMELINE INDICATORE */

function updateSlider(){

slider.value=modelViewer.currentTime || 0

requestAnimationFrame(updateSlider)

}

updateSlider()

</script>

</body>
</html>
